# =====================================================================================
# DATABASE SECRET RESOURCE
# =====================================================================================
  # This Kubernetes Secret stores the database connection string (DSN) for the Go API.
  #
  # WHY USE A SECRET EVEN THOUGH DSN IS IN values.yaml?
  # -----------------------------------------------------------------------------
  # 1. SEPARATION OF CONCERNS:
  #    - values.yaml defines the DESIRED state (can be committed to Git for local dev)
  #    - Secret resource is the KUBERNETES way to handle sensitive data
  #    - YOUR DEPLOYMENT REFERENCES THE SECRET, NOT values.yaml directly
# =====================================================================================

apiVersion: v1
kind: Secret
metadata:
  # Name includes release name to avoid conflicts between multiple deployments
  name: {{ include "go-api-chart" . }}-db-secret
  labels:
    {{- include "go-api-chart.labels" . | nindent 4 }}
# Type: Opaque means this is a generic secret (arbitrary key-value pairs)
# Other types: kubernetes.io/tls, kubernetes.io/dockerconfigjson, etc.
type: Opaque

# stringData allows plain-text input (Kubernetes auto-converts to base64)
# Alternative: Use 'data' field with manually base64-encoded values
stringData:
  # DBSTRING is the key your Go app reads from the environment
  # Value comes from .Values.db.dsn in values.yaml (or overrides)
  # quote ensures the DSN is properly quoted (handles special chars)
  DBSTRING: {{ .Values.db.dsn | quote }}
  # You can add more keys here if needed (e.g., DBUSER, DBPASS) and reference them in your app
