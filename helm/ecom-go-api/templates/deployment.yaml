# ------------------------------------------------------------------------------------------
# This template defines a Deployment resource for the Go API application.
# It is conditionally created based on the 'autoscaling.enabled' value in values.yaml.
# The Deployment manages the desired state of the application pods, including replicas,
# container image, environment variables, and resource requests/limits.
# ------------------------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "go-api-chart.fullname" . }}
  labels:
    {{- include "go-api-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "go-api-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "go-api-chart.selectorLabels" . | nindent 8 }}
        app: ecom-go-api
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "go-api-chart.fullname" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DBSTRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "go-api-chart.fullname" . }}-db-secret
                  key: DBSTRING
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
