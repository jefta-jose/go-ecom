{{- if .Values.serviceAccount.create }}

# ------------------------------------------------------------------------------------------
# This template defines a ServiceAccount resource for the Go API application.
# A ServiceAccount provides an identity for pods running in this namespace.
# It allows the pod to interact with the Kubernetes API and optionally
# integrate with cloud IAM roles (e.g., AWS IAM, GCP Service Accounts, Azure Managed Identities).
# This is crucial for securely granting permissions without using default credentials.
# ------------------------------------------------------------------------------------------

apiVersion: v1
kind: ServiceAccount
metadata:
  # Name of the ServiceAccount is generated based on the Helm chart's fullname template
  name: {{ include "go-api-chart" . }}
  labels:
    # Standard labels for selection, monitoring, and management
    {{- include "go-api-chart.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    # Optional annotations for cloud IAM role binding, auditing, or other metadata
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}