{{- if .Values.externalSecrets.enabled }}

# ------------------------------------------------------------------------------------------
## ExternalSecret - Fetches secrets from cloud secret managers
## Requires External Secrets Operator: https://external-secrets.io
## Install with: helm repo add external-secrets https://charts.external-secrets.io
##               helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
# ------------------------------------------------------------------------------------------

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "go-api-chart" . }}-external-secret
  labels:
    {{- include "go-api-chart.labels" . | nindent 4 }}
spec:
  # How often to sync secrets from the external source (e.g., 1h, 5m)
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  
  # Reference to the SecretStore that defines the connection to the cloud provider
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  
  # The target Kubernetes Secret to create/update
  target:
    name: {{ include "go-api-chart" . }}-db-secret
    creationPolicy: Owner
  
  # Map external secret keys to Kubernetes secret keys
  data:
    {{- if eq .Values.externalSecrets.provider "aws" }}
    # AWS Secrets Manager - fetch by secret name and key
    - secretKey: DBSTRING
      remoteRef:
        key: {{ .Values.externalSecrets.aws.secretName }}
        property: {{ .Values.externalSecrets.aws.secretKey }}
    {{- else if eq .Values.externalSecrets.provider "azure" }}
    # Azure Key Vault - fetch by secret name
    - secretKey: DBSTRING
      remoteRef:
        key: {{ .Values.externalSecrets.azure.secretName }}
    {{- else if eq .Values.externalSecrets.provider "gcp" }}
    # GCP Secret Manager - fetch by secret name and version
    - secretKey: DBSTRING
      remoteRef:
        key: {{ .Values.externalSecrets.gcp.secretName }}
        version: {{ .Values.externalSecrets.gcp.secretVersion }}
    {{- end }}
{{- end }}
