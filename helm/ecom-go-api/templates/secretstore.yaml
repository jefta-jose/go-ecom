{{- if .Values.externalSecrets.enabled }}

# -------------------------------------------------------------------------------------------
# SecretStore - Configures connection to cloud secret managers
# Requires External Secrets Operator: https://external-secrets.io
# Each cloud provider requires different authentication and permissions
# -------------------------------------------------------------------------------------------

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  labels:
    {{- include "go-api-chart.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.externalSecrets.provider "aws" }}
  ## AWS Secrets Manager Configuration
  ## Requires: IAM role with secretsmanager:GetSecretValue permission
  ## Can use IRSA (IAM Roles for Service Accounts) or EC2 instance role
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region }}
      {{- if .Values.externalSecrets.aws.roleArn }}
      # Use IAM Role for Service Account (IRSA) - recommended for EKS
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "go-api-chart.fullname" . }}
      role: {{ .Values.externalSecrets.aws.roleArn }}
      {{- else }}
      # Use EC2 instance role or access keys stored in a Kubernetes secret
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: {{ .Values.externalSecrets.aws.credentialsSecretName }}
            key: access-key-id
          secretAccessKeySecretRef:
            name: {{ .Values.externalSecrets.aws.credentialsSecretName }}
            key: secret-access-key
      {{- end }}
  
  {{- else if eq .Values.externalSecrets.provider "azure" }}
  ## Azure Key Vault Configuration
  ## Requires: Azure service principal or managed identity with Key Vault access
  provider:
    azurekv:
      # Key Vault URL (e.g., https://my-vault.vault.azure.net/)
      vaultUrl: {{ .Values.externalSecrets.azure.vaultUrl }}
      {{- if .Values.externalSecrets.azure.useManagedIdentity }}
      # Use Azure Managed Identity (recommended for AKS)
      authType: ManagedIdentity
      {{- else }}
      # Use Service Principal credentials stored in a Kubernetes secret
      authType: ServicePrincipal
      authSecretRef:
        clientId:
          name: {{ .Values.externalSecrets.azure.credentialsSecretName }}
          key: client-id
        clientSecret:
          name: {{ .Values.externalSecrets.azure.credentialsSecretName }}
          key: client-secret
      tenantId: {{ .Values.externalSecrets.azure.tenantId }}
      {{- end }}
  
  {{- else if eq .Values.externalSecrets.provider "gcp" }}
  ## GCP Secret Manager Configuration
  ## Requires: Service account with secretmanager.versions.access permission
  ## Can use Workload Identity or service account key
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcp.projectId }}
      {{- if .Values.externalSecrets.gcp.useWorkloadIdentity }}
      # Use Workload Identity (recommended for GKE)
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.gcp.clusterLocation }}
          clusterName: {{ .Values.externalSecrets.gcp.clusterName }}
          serviceAccountRef:
            name: {{ include "go-api-chart.fullname" . }}
      {{- else }}
      # Use service account key stored in a Kubernetes secret
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: {{ .Values.externalSecrets.gcp.credentialsSecretName }}
            key: service-account-key
      {{- end }}
  {{- end }}
{{- end }}
